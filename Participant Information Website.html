<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pinch Grip Experiment Instructions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* ---------- Base layout ---------- */
    body {
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem;
      background: linear-gradient(180deg, #ffe6f4, #ffdff0 45%, #fff7fb);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ---------- Fluffy cloud background ---------- */
    .cloud {
      position: absolute;
      background: #ffffffaa;
      border-radius: 999px;
      filter: blur(2px);
      box-shadow:
        30px 10px 40px #ffffffbb,
        -20px 5px 30px #ffffffbb;
      animation: floatCloud 18s linear infinite;
      pointer-events: none;
    }

    .cloud.cloud-1 { width: 220px; height: 80px; top: 8%; left: 5%; animation-delay: 0s; }
    .cloud.cloud-2 { width: 260px; height: 90px; top: 18%; right: -10%; animation-delay: 4s; }
    .cloud.cloud-3 { width: 180px; height: 70px; bottom: 10%; left: -15%; animation-delay: 8s; }

    @keyframes floatCloud {
      0% { transform: translateX(0); opacity: 0.75; }
      50% { opacity: 1; }
      100% { transform: translateX(40vw); opacity: 0.75; }
    }

    /* ---------- Sparkles ---------- */
    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #fff 0, #ffe2f5 40%, transparent 70%);
      border-radius: 50%;
      animation: twinkle 2.2s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .sparkle.s1 { top: 12%; left: 40%; animation-delay: 0.1s; }
    .sparkle.s2 { top: 30%; right: 15%; animation-delay: 0.5s; }
    .sparkle.s3 { bottom: 20%; left: 25%; animation-delay: 0.9s; }
    .sparkle.s4 { bottom: 8%; right: 35%; animation-delay: 1.3s; }

    @keyframes twinkle {
      0% { transform: scale(0.7); opacity: 0.4; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    /* ---------- Main card ---------- */
    .page-wrapper {
      width: 100%;
      max-width: 820px;
      background: #ffffffee;
      backdrop-filter: blur(10px);
      padding: 2.3rem 2.6rem 2rem;
      border-radius: 26px;
      border: 2px solid #ffb6dd;
      box-shadow: 0 14px 35px rgba(255, 105, 180, 0.27);
      position: relative;
      z-index: 2;
      animation: floatIn 0.6s ease-out;
      box-sizing: border-box;
      margin-bottom: 2rem;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      margin: 0;
      font-size: 1.7rem;
      color: #e6459b;
      font-weight: 800;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #a34e88;
      margin-bottom: 0.8rem;
    }

    /* ---------- Mascot: cat paws + fish ---------- */
    .mascot {
      flex-shrink: 0;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0, #ffe5f2 35%, #ffc1de 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(255, 155, 204, 0.55);
      position: relative;
      overflow: visible;
      animation: mascotFloat 3s ease-in-out infinite;
    }

    @keyframes mascotFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    .mascot-inner {
      position: relative;
      width: 72px;
      height: 72px;
    }

    /* Cat paws */
    .cat-paw {
      position: absolute;
      width: 40px;
      height: 40px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(255, 160, 209, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-paw-left {
      bottom: 2px;
      left: -2px;
      transform: rotate(-12deg);
    }

    .cat-paw-right {
      bottom: 2px;
      right: -2px;
      transform: rotate(12deg);
    }

    .paw-pad-main {
      width: 20px;
      height: 20px;
      background: #ffb6d9;
      border-radius: 50%;
      position: relative;
    }

    .paw-toes {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
    }

    .paw-toe {
      width: 8px;
      height: 10px;
      background: #ffb6d9;
      border-radius: 999px;
    }

    /* Blue fish in the paws */
    .mascot-fish {
      position: absolute;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fish-body {
      width: 52px;
      height: 26px;
      background: linear-gradient(90deg, #6bbcff, #4fa3f0);
      border-radius: 999px;
      position: relative;
      box-shadow: 0 3px 6px rgba(79, 163, 240, 0.65);
    }

    .fish-body::after {
      /* subtle highlight */
      content: "";
      position: absolute;
      top: 4px;
      left: 8px;
      right: 14px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
    }

    .fish-tail {
      width: 20px;
      height: 18px;
      background: #4fa3f0;
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
      margin-left: -6px;
    }

    .fish-eye {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #000000;
      border-radius: 50%;
      left: 10px;
      top: 9px;
    }

    .fish-gill {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-left-color: transparent;
      border-bottom-color: transparent;
      right: 16px;
      top: 10px;
    }

    .mascot-badge {
      position: absolute;
      bottom: -6px;
      right: 8px;
      background: #ff8ec7;
      color: #fff;
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(255, 105, 180, 0.5);
      font-weight: 700;
    }

    .mascot-speech {
      font-size: 0.92rem;
      background: #fff7fd;
      border-radius: 16px;
      border: 1px solid #ffd1ec;
      padding: 0.75rem 1rem;
      margin-bottom: 1.2rem;
      color: #7b3b70;
      display: inline-block;
      position: relative;
    }

    .mascot-speech::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -8px;
      border-width: 8px 8px 0 8px;
      border-style: solid;
      border-color: #ffd1ec transparent transparent transparent;
    }

    /* ---------- Content styling ---------- */
    #page-content p {
      font-size: 1.02rem;
      line-height: 1.7;
      color: #000000;
      margin: 0.85rem 0;
    }

    #page-content ul {
      padding-left: 1.2rem;
      margin: 0.7rem 0 0.3rem;
    }

    #page-content li {
      margin: 0.35rem 0;
      line-height: 1.6;
      font-size: 1rem;
    }

    .phase-list li::marker {
      content: "🌸 ";
    }

    .tip-box {
      background: #fff5fb;
      border-radius: 14px;
      border: 1px dashed #ff9fcb;
      padding: 0.75rem 0.9rem;
      font-size: 0.93rem;
      margin-top: 0.7rem;
      color: #7a3268;
    }

    .highlight {
      font-weight: 700;
      color: #d83786;
    }

    .label-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: #ffe4f4;
      border: 1px solid #ffbcdc;
      font-size: 0.8rem;
      font-weight: 700;
      color: #b33476;
      margin-right: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .label-dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #ff7ebc;
    }

    /* ---------- Progress + nav ---------- */
    #progress-section {
      margin-top: 1.3rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #ffd7ec;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #ffb3dd;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff8ec7, #ff63b0, #ff9dd7);
      transition: width 0.25s ease-out;
    }

    .page-indicator {
      text-align: center;
      color: #d25397;
      margin-top: 0.45rem;
      font-size: 0.92rem;
      font-weight: 600;
    }

    /* Clickable phase timeline */
    .phase-timeline {
      margin-top: 0.6rem;
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      -webkit-overflow-scrolling: touch;
    }

    .phase-pill {
      flex: 0 0 auto;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      border: 1px solid #ffb8de;
      background: #fff7fd;
      font-size: 0.78rem;
      color: #b04882;
      white-space: nowrap;
      cursor: pointer;
      transition:
        background 0.18s ease,
        color 0.18s ease,
        box-shadow 0.18s ease,
        transform 0.08s ease;
    }

    .phase-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(255, 132, 195, 0.45);
    }

    .phase-pill-active {
      background: linear-gradient(90deg, #ff8ec7, #ff63b0);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 6px rgba(220, 84, 151, 0.6);
    }

    .phase-pill-index {
      font-weight: 700;
      margin-right: 0.3rem;
    }

    .phase-pill-label {
      font-weight: 500;
    }

    .nav {
      display: flex;
      align-items: center;
      margin-top: 1.7rem;
      gap: 0.6rem;
    }

    #next-btn {
      margin-left: auto; /* keeps Next aligned right on all pages */
    }

    .heart-button {
      border: none;
      padding: 0.8rem 1.7rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.98rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff9acb, #ff6fb6);
      color: white;
      box-shadow: 0 5px 12px rgba(255, 105, 180, 0.45);
      position: relative;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      width: 100%;
      max-width: 220px;
    }

    .heart-button::before {
      content: "❤";
      margin-right: 0.4rem;
      font-size: 1.05rem;
    }

    .heart-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 7px 16px rgba(255, 105, 180, 0.6);
      filter: brightness(1.05);
    }

    .heart-button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 3px 8px rgba(255, 105, 180, 0.4);
    }

    .heart-button:disabled {
      background: linear-gradient(135deg, #f7c8e1, #f3b4d8);
      cursor: default;
      box-shadow: none;
      filter: grayscale(0.1);
    }

    .heart-button.secondary {
      background: linear-gradient(135deg, #ffdbe9, #ffc3df);
      color: #b13675;
      box-shadow: 0 3px 8px rgba(255, 182, 216, 0.7);
    }

    .heart-button.secondary::before {
      content: "⟵";
      font-size: 1rem;
    }

    .heart-button.primary::before {
      content: "⟶";
      font-size: 1rem;
      margin-right: 0.3rem;
    }

    .heart-button.primary.done::before {
      content: "✔";
    }

    /* ---------- Diagram styling for “What You’ll Do” ---------- */
    .diagram-wrapper {
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px dashed #ffbcd7;
    }

    .diagram-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #c43780;
      margin-bottom: 0.5rem;
    }

    .diagram-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .step-card {
      background: #fff8fd;
      border-radius: 14px;
      border: 1px solid #ffd0ec;
      padding: 0.6rem 0.7rem;
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      font-size: 0.9rem;
    }

    .step-circle {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0, #ffe0f3 40%, #ffb5dd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #b02f73;
      box-shadow: 0 2px 5px rgba(255, 143, 202, 0.55);
      font-size: 0.9rem;
    }

    .step-text {
      line-height: 1.4;
    }

    .step-label {
      font-weight: 700;
      color: #aa2f6c;
      display: block;
    }

    .step-sub {
      font-size: 0.83rem;
      color: #7a3268;
    }

    /* ---------- Mini practice animation ---------- */
    .practice-wrapper {
      margin-top: 1.1rem;
      padding: 0.75rem 0.8rem 0.85rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #fff7fd, #ffeef9);
      border: 1px solid #ffd4ec;
    }

    .practice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .practice-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #b7357b;
    }

    .practice-play-btn {
      border: none;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      background: linear-gradient(90deg, #ff8ec7, #ff5eae);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(212, 80, 150, 0.6);
      transition:
        transform 0.1s ease,
        box-shadow 0.1s ease,
        opacity 0.15s ease;
    }

    .practice-play-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 7px rgba(212, 80, 150, 0.7);
    }

    .practice-play-btn:active {
      transform: translateY(0);
      box-shadow: 0 1px 3px rgba(212, 80, 150, 0.45);
    }

    .practice-play-label {
      letter-spacing: 0.01em;
    }

    .practice-viewport {
      position: relative;
      margin-top: 0.35rem;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 0%, #ffffff 0, #ffeefe 48%, #ffd8f0 100%);
      border: 1px solid #ffd0ec;
      padding: 0.65rem 0.9rem 0.8rem;
      height: 140px;
      overflow: hidden;
    }

    .practice-table {
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 10px;
      height: 10px;
      border-radius: 10px;
      background: linear-gradient(180deg, #f4c2e4, #e09bce);
      box-shadow: 0 -2px 6px rgba(195, 88, 151, 0.55) inset;
    }

    .practice-markers {
      position: absolute;
      left: 9%;
      top: 10px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .marker {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #9a3f7a;
    }

    .marker-line {
      width: 14px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffa2d1, #ff6eb4);
    }

    .marker-label {
      opacity: 0.9;
    }

    .practice-device {
      position: absolute;
      left: 50%;
      bottom: 14px;
      width: 84px;
      height: 42px;
      transform: translate(-50%, 0);
    }

    .device-core {
      position: absolute;
      left: 50%;
      bottom: 16px;
      width: 52px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 10px;
      background: linear-gradient(180deg, #8dd6ff, #5bb5f5);
      box-shadow: 0 3px 6px rgba(87, 140, 217, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .device-sensor {
      width: 60%;
      height: 60%;
      border-radius: 8px;
      background: linear-gradient(180deg, #e7f4ff, #c8ddff);
    }

    .device-grip {
      position: absolute;
      width: 14px;
      height: 32px;
      border-radius: 999px;
      background: linear-gradient(180deg, #a4e58b, #5bbf54);
      box-shadow: 0 2px 4px rgba(74, 149, 75, 0.5);
      top: 6px;
    }

    .device-grip-left {
      left: 0;
    }

    .device-grip-right {
      right: 0;
    }

    .device-housing {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 46px;
      height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 50% 0%, #f7b1ff, #d27ae5);
      box-shadow: 0 3px 6px rgba(163, 72, 191, 0.65);
    }

    @keyframes practiceSequence {
      0%   { transform: translate(-50%, 0); }
      10%  { transform: translate(-50%, 0); }
      22%  { transform: translate(-50%, -32px); }
      38%  { transform: translate(-50%, -32px); }
      52%  { transform: translate(-50%, -76px); }
      68%  { transform: translate(-50%, -76px); }
      82%  { transform: translate(-50%, -32px); }
      100% { transform: translate(-50%, 0); }
    }

    .practice-viewport.is-playing .practice-device {
      animation: practiceSequence 11s ease-in-out forwards;
    }

    .practice-caption {
      margin-top: 0.55rem;
      font-size: 0.85rem;
      color: #8b3c79;
      line-height: 1.5;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* ---------- FAQ screen styling ---------- */
    .faq-wrapper {
      margin-top: 0.4rem;
    }

    .faq-intro {
      font-size: 0.96rem;
      color: #7b3b70;
      margin-bottom: 0.9rem;
    }

    .faq-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
      gap: 1rem;
    }

    .faq-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .faq-button {
      border-radius: 999px;
      border: 1px solid #ffb9dd;
      background: #fff6fc;
      padding: 0.45rem 0.85rem;
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: #983067;
      transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
    }

    .faq-button span.emoji {
      font-size: 1.1rem;
    }

    .faq-button:hover {
      background: #ffe6f5;
      box-shadow: 0 3px 8px rgba(255, 140, 201, 0.35);
      transform: translateY(-1px);
    }

    .faq-button.active {
      background: linear-gradient(135deg, #ffb4dc, #ff8ac6);
      color: #5e1342;
      box-shadow: 0 4px 10px rgba(255, 104, 181, 0.5);
      font-weight: 700;
    }

    .faq-answer {
      background: #fff8fd;
      border-radius: 18px;
      border: 1px solid #ffd2ec;
      padding: 0.9rem 1rem;
      font-size: 0.94rem;
      color: #6c2b5a;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .faq-answer-title {
      font-weight: 700;
      color: #c43880;
      margin-bottom: 0.1rem;
    }

    .faq-email-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9ace, #ff6ab6);
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-top: 0.4rem;
      box-shadow: 0 4px 10px rgba(255, 105, 180, 0.5);
    }

    .faq-email-btn::before {
      content: "✉";
      font-size: 1rem;
    }

    .faq-note {
      font-size: 0.82rem;
      color: #8a3b6f;
      margin-top: 0.3rem;
    }

    .faq-tagline {
      font-size: 0.82rem;
      color: #a24e84;
      margin-top: 0.2rem;
      font-style: italic;
    }

    /* ---------- Small screen tweaks ---------- */
    @media (max-width: 640px) {
      body {
        padding: 1.2rem;
        align-items: flex-start;
      }
      .page-wrapper {
        padding: 1.6rem 1.4rem 1.4rem;
      }
      .header-row {
        flex-direction: column-reverse;
        align-items: flex-start;
      }
      .mascot {
        align-self: center;
      }
      h1 {
        font-size: 1.4rem;
      }
      .nav {
        flex-direction: column-reverse;
        align-items: stretch;
      }
      #next-btn {
        margin-left: 0; /* full-width buttons on mobile */
      }
      .heart-button {
        max-width: none;
      }
      .faq-layout {
        grid-template-columns: minmax(0, 1fr);
      }
      .practice-viewport {
        height: 130px;
        padding: 0.6rem 0.65rem 0.7rem;
      }
      .phase-timeline {

      const answerEl = document.getElementById("faq-answer");

      function showFaq(key, button) {
        const data = faqData[key];
        if (!data) return;
        faqButtons.forEach(btn => btn.classList.remove("active"));
        if (button) button.classList.add("active");
        answerEl.innerHTML = `
          <div class="faq-answer-title">${data.title}</div>
          ${data.body}
        `;
      }

      faqButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.getAttribute("data-faq-key");
          showFaq(key, btn);
        });
      });

      if (faqButtons[0]) {
        showFaq(faqButtons[0].getAttribute("data-faq-key"), faqButtons[0]);
      }

      scrollToTopIfMobile();
    }

    /* ---- Navigation ---- */
    backBtn.addEventListener("click", () => {
      if (inFaqMode) return;
      if (currentPageIndex > 0) {
        currentPageIndex--;
        renderPage(currentPageIndex);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (inFaqMode) return;
      if (currentPageIndex < pages.length - 1) {
        currentPageIndex++;
        renderPage(currentPageIndex);
        scrollToTopIfMobile();
      } else {
        enterFaqMode();
      }
    });

    /* ---- Init ---- */
    createPhaseTimeline();
    renderPage(currentPageIndex);
  </script>
</body>
</html>
